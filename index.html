<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cafe English App</title>
</head>
<body>

<h2>☕ Cafe English Practice</h2>

<button onclick="startApp()">▶ START</button>
<button onclick="resetChat()">🔄 END</button>

<div id="chat" style="border:1px solid #ccc; padding:10px; height:300px; overflow:auto;"></div>
<div id="buttons"></div>

<input id="userInput" type="text" placeholder="Type here..." style="width:80%;">
<button onclick="sendMessage()">Send</button>
<button onclick="startListening()">🎤 Speak</button>

<script>
let chatDiv = document.getElementById("chat");
let buttonsDiv = document.getElementById("buttons");
let started = false;

// 🎤 音声（英語っぽく改善）
function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-US";

  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang === "en-US");

  if (enVoice) utterance.voice = enVoice;

  speechSynthesis.speak(utterance);
}

// ▶ START
function startApp() {
  started = true;
  resetChat();
}

// 🔄 END
function resetChat() {
  chatDiv.innerHTML = "";
  addMessage("Barista", "Hi! Here's our menu:\n- Coffee\n- Latte\n- Tea\nWhat would you like?");
  setButtons(["Coffee", "Latte", "Tea"]);
}

// 💬 メッセージ表示
function addMessage(sender, text) {
  chatDiv.innerHTML += "<p><b>" + sender + ":</b> " + text + "</p>";
  chatDiv.scrollTop = chatDiv.scrollHeight;

  if (sender === "Barista" && started) {
    speak(text);
  }
}

// 🔘 ボタン生成
function setButtons(options) {
  buttonsDiv.innerHTML = "";
  options.forEach(option => {
    let btn = document.createElement("button");
    btn.innerText = option;
    btn.onclick = () => {
      document.getElementById("userInput").value = option;
      sendMessage();
    };
    buttonsDiv.appendChild(btn);
  });
}

// 📩 メッセージ送信
function sendMessage() {
  let input = document.getElementById("userInput");
  let userText = input.value;

  if (!userText) return;

  addMessage("You", userText);

  let reply = getAIResponse(userText);

  setTimeout(() => {
    addMessage("Barista", reply.text);
    setButtons(reply.options);
  }, 500);

  input.value = "";
}

// 🧠 会話＋発音チェック
function getAIResponse(text) {
  text = text.toLowerCase();

  // 発音チェック（簡易）
  if (text.includes("i want coffee")) {
    return {
      text: "Good! But more natural is: 'I'd like a coffee.' 😊 What size?",
      options: ["Small", "Medium", "Large"]
    };
  }

  if (text.includes("coffee") || text.includes("latte") || text.includes("tea")) {
    return {
      text: "Great choice! What size?",
      options: ["Small", "Medium", "Large"]
    };
  }

  if (text.includes("small") || text.includes("medium") || text.includes("large")) {
    return {
      text: "Hot or iced?",
      options: ["Hot", "Iced"]
    };
  }

  if (text.includes("hot") || text.includes("iced")) {
    return {
      text: "Anything else?",
      options: ["That's all", "Add more"]
    };
  }

  if (text.includes("that's all") || text.includes("no")) {
    return {
      text: "Perfect! Your total is $5. Thank you! 😊",
      options: []
    };
  }

  return {
    text: "Try saying: 'I'd like a latte.' 😊",
    options: ["Latte", "Coffee", "Tea"]
  };
}

// 🎤 音声入力（PC用）
function startListening() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    document.getElementById("userInput").value = text;
    sendMessage();
  };

  recognition.start();
}
</script>

</body>
</html>
